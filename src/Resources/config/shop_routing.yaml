sylius_shop_checkout_complete:
  path: /checkout/complete
  methods: [GET, PUT]
  defaults:
      _controller: sylius.controller.order::updateAction
      _sylius:
          event: complete
          flash: false
          template: "@SyliusSystempayPlugin/shop/Checkout/complete.html.twig"
          repository:
              method: findCartForSummary
              arguments:
                  - "expr:service('sylius.context.cart').getCart().getId()"
          state_machine:
              graph: sylius_order_checkout
              transition: complete
          redirect:
              route: sylius_shop_order_pay
              parameters:
                  tokenValue: resource.tokenValue
          form:
              type: Sylius\Bundle\CoreBundle\Form\Type\Checkout\CompleteType # Sylius\SystempayPlugin\Form\Type\SystempayCompleteType
              options:
                  validation_groups: 'sylius_checkout_complete'